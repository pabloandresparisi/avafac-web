  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

th=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><ellipse cx=\"12\" cy=\"5\" rx=\"9\" ry=\"3\"><\u002Fellipse><path d=\"M21 12c0 1.66-4.03 3-9 3S3 13.66 3 12\"><\u002Fpath><path d=\"M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;\">Multiempresa<\u002Fdiv><div style=\"font-size:.78rem;color:#5c7a9a;\">Una base por empresa<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FEATURES -->\n<section id=\"funciones\" style=\"background:#f7f9fc;padding:80px 0;\">\n  <div style=\"max-width:1200px;margin:0 auto;padding:0 32px;\">\n    <div style=\"text-align:center;margin-bottom:48px;\">\n      <div style=\"font-size:.75rem;font-weight:700;color:#16a34a;text-transform:uppercase;letter-spacing:1.3px;margin-bottom:10px;\">Todo en un solo lugar<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3vw,2.4rem);font-weight:800;color:#0a2540;letter-spacing:-.5px;margin-bottom:12px;\">Funciones que hacen la diferencia<\u002Fh2>\n      <p style=\"font-size:1.02rem;color:#5c7a9a;max-width:540px;margin:0 auto;line-height:1.65;\">Desde la venta rápida hasta el control fiscal y de inventario, avaFAC cubre toda la operación.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"fg\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><line x1=\"9\" y1=\"13\" x2=\"15\" y2=\"13\"><\u002Fline><line x1=\"9\" y1=\"17\" x2=\"13\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Facturación Electrónica AFIP<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Facturas A, B y C con CAE en línea contra ARCA. Gestiona el ticket de acceso, el punto de venta y la numeración automáticamente. Opera con comprobantes no fiscales si la FE está deshabilitada.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><polyline points=\"10 14 8 14 8 12\"><\u002Fpolyline><path d=\"M8 12h4a2 2 0 000-4H11\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Notas de Crédito<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">NC electrónicas y no fiscales asociadas a la factura original. Revierten el stock automáticamente y quedan vinculadas al comprobante de origen.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"1\" y=\"4\" width=\"22\" height=\"16\" rx=\"2\"><\u002Frect><line x1=\"1\" y1=\"10\" x2=\"23\" y2=\"10\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Cuenta corriente y crédito<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Vendé a crédito a clientes registrados con límite opcional, plazo configurable y control de deuda vencida por aging FIFO. El saldo a favor también se aplica como medio de pago en cualquier venta.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 8h20v12a2 2 0 01-2 2H4a2 2 0 01-2-2V8z\"><\u002Fpath><path d=\"M22 8l-2-4H4L2 8\"><\u002Fpath><circle cx=\"12\" cy=\"14\" r=\"2\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Caja y arqueo<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Apertura con fondo inicial, ingresos y egresos manuales, arqueo ciego por medio de pago con esperado vs. declarado, cierre (Z) imprimible e historial completo de sesiones.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"13 2 3 14 12 14 11 22 21 10 12 10 13 2\"><\u002Fpolygon><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Venta rápida y vuelto<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Pantalla por departamentos con botones de producto. Varias ventas abiertas en paralelo. Calculá el vuelto seleccionando los billetes recibidos y cobrá con múltiples medios de pago.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12.89 1.45l8 4A2 2 0 0122 7.24v9.53a2 2 0 01-1.11 1.79l-8 4a2 2 0 01-1.78 0l-8-4A2 2 0 012 16.76V7.24a2 2 0 011.11-1.79l8-4a2 2 0 011.78 0z\"><\u002Fpath><polyline points=\"2.32 6.16 12 11 21.68 6.16\"><\u002Fpolyline><line x1=\"12\" y1=\"22.76\" x2=\"12\" y2=\"11\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Stock con kardex<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Trazabilidad de cada movimiento de inventario. El stock se reserva al instante al cargar un ítem. Concurrencia multiusuario robusta y ajuste manual de inventario.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9\"><\u002Fpath><path d=\"M13.73 21a2 2 0 01-3.46 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Comandas a cocina y barra<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Impresión automática por sector según la categoría del artículo: cocina o bebidas. Reimpresión por ítem disponible para evitar errores en el servicio.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Plano gráfico de salón<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Mesas con color por estado, arrastrables con memoria de posición. Múltiples salones, reserva y cliente por mesa desde el menú contextual. Un clic abre la mesa.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"18\" cy=\"5\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"12\" r=\"3\"><\u002Fcircle><circle cx=\"18\" cy=\"19\" r=\"3\"><\u002Fcircle><line x1=\"8.59\" y1=\"13.51\" x2=\"15.42\" y2=\"17.49\"><\u002Fline><line x1=\"15.41\" y1=\"6.51\" x2=\"8.59\" y2=\"10.49\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">División de cuenta<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Dividí la cuenta en partes iguales: un solo comprobante y cada parte se cobra por separado con su propio medio de pago. Las mesas se mantienen abiertas entre cortes de luz.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 00-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 010 7.75\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Clientes, artículos y código de barras<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Gestión completa de clientes, artículos con lectura de código de barras, categorías, talonarios, medios de pago y operadoras de tarjetas.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0110 0v4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Usuarios y permisos<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Más de 25 permisos individuales por empleado. Auditoría completa de quién realiza cada venta y movimiento en el sistema.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Resguardo de datos<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Backup y restauración de la base de datos integrados. Funciona en red con SQL Express (servidor/cliente) o en modo monousuario con LocalDB.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z\"><\u002Fpath><line x1=\"7\" y1=\"7\" x2=\"7.01\" y2=\"7\" stroke-width=\"2.5\"><\u002Fline><line x1=\"11\" y1=\"11\" x2=\"17\" y2=\"11\"><\u002Fline><line x1=\"11\" y1=\"15\" x2=\"15\" y2=\"15\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Listas de precios múltiples<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Precios diferenciados por lista: General, Delivery, Mayorista y más. Se elige la lista al abrir cada mesa o venta y cada artículo tiene su precio por lista.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M16 11l2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Mozo asignado y liquidación<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Asigná un mozo a cada mesa al crearla. El nombre persiste en la venta y en el historial. Ticket de liquidación por mozo agrupado por medio de pago desde el módulo de Caja.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:14px;padding:24px;transition:transform .2s,box-shadow .2s,border-color .2s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 32px rgba(18,75,115,.09);border-color:transparent;\">\n        <div style=\"width:46px;height:46px;background:#eef3fa;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><line x1=\"9\" y1=\"13\" x2=\"15\" y2=\"13\"><\u002Fline><line x1=\"9\" y1=\"17\" x2=\"13\" y2=\"17\"><\u002Fline><polyline points=\"9 9 10 9 10 11\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#0a2540;margin-bottom:6px;\">Recibos de cobro (REC X)<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#5c7a9a;line-height:1.6;\">Emití recibos no fiscales para clientes con deuda en cuenta corriente. Distribución por medios de pago, ticket imprimible, integración al arqueo de caja y anulación con contramovimiento automático.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- RUBROS -->\n<section id=\"rubros\" style=\"background:#fff;padding:80px 0;\">\n  <div style=\"max-width:1200px;margin:0 auto;padding:0 32px;\">\n    <div style=\"text-align:center;margin-bottom:48px;\">\n      <div style=\"font-size:.75rem;font-weight:700;color:#16a34a;text-transform:uppercase;letter-spacing:1.3px;margin-bottom:10px;\">Un sistema, muchos rubros<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3vw,2.4rem);font-weight:800;color:#0a2540;letter-spacing:-.5px;margin-bottom:12px;\">Pensado para tu tipo de negocio<\u002Fh2>\n      <p style=\"font-size:1.02rem;color:#5c7a9a;max-width:500px;margin:0 auto;line-height:1.65;\">Activás el modo que necesitás y el sistema trabaja a la medida de tu negocio.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"rg\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n\n      <div style=\"background:#f7f9fc;border:1px solid #e4eaf2;border-radius:14px;padding:22px;display:flex;gap:14px;align-items:flex-start;transition:all .2s;\" style-hover=\"background:#fff;box-shadow:0 8px 24px rgba(18,75,115,.08);border-color:transparent;transform:translateY(-2px);\">\n        <div style=\"width:44px;height:44px;background:#fff;border:1px solid #e4eaf2;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;flex-shrink:0;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 8h1a4 4 0 010 8h-1\"><\u002Fpath><path d=\"M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z\"><\u002Fpath><line x1=\"6\" y1=\"1\" x2=\"6\" y2=\"4\"><\u002Fline><line x1=\"10\" y1=\"1\" x2=\"10\" y2=\"4\"><\u002Fline><line x1=\"14\" y1=\"1\" x2=\"14\" y2=\"4\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <div><h4 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:.97rem;font-weight:700;color:#0a2540;margin-bottom:4px;\">Bares y restaurantes<\u002Fh4><p style=\"font-size:.85rem;color:#5c7a9a;line-height:1.5;\">Mesas, plano de salón, comandas a cocina y división de cuenta.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#f7f9fc;border:1px solid #e4eaf2;border-radius:14px;padding:22px;display:flex;gap:14px;align-items:flex-start;transition:all .2s;\" style-hover=\"background:#fff;box-shadow:0 8px 24px rgba(18,75,115,.08);border-color:transparent;transform:translateY(-2px);\">\n        <div style=\"width:44px;height:44px;background:#fff;border:1px solid #e4eaf2;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;flex-shrink:0;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z\"><\u002Fpath><polyline points=\"9 22 9 12 15 12 15 22\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n        <div><h4 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:.97rem;font-weight:700;color:#0a2540;margin-bottom:4px;\">Kioscos y autoservicios<\u002Fh4><p style=\"font-size:.85rem;color:#5c7a9a;line-height:1.5;\">Venta rápida por código de barras y cobro ágil en el mostrador.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#f7f9fc;border:1px solid #e4eaf2;border-radius:14px;padding:22px;display:flex;gap:14px;align-items:flex-start;transition:all .2s;\" style-hover=\"background:#fff;box-shadow:0 8px 24px rgba(18,75,115,.08);border-color:transparent;transform:translateY(-2px);\">\n        <div style=\"width:44px;height:44px;background:#fff;border:1px solid #e4eaf2;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;flex-shrink:0;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div><h4 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:.97rem;font-weight:700;color:#0a2540;margin-bottom:4px;\">Ferreterías y comercios<\u002Fh4><p style=\"font-size:.85rem;color:#5c7a9a;line-height:1.5;\">Miles de artículos, control de stock y cuenta corriente de clientes.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#f7f9fc;border:1px solid #e4eaf2;border-radius:14px;padding:22px;display:flex;gap:14px;align-items:flex-start;transition:all .2s;\" style-hover=\"background:#fff;box-shadow:0 8px 24px rgba(18,75,115,.08);border-color:transparent;transform:translateY(-2px);\">\n        <div style=\"width:44px;height:44px;background:#fff;border:1px solid #e4eaf2;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;flex-shrink:0;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"22 12 18 12 15 21 9 3 6 12 2 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n        <div><h4 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:.97rem;font-weight:700;color:#0a2540;margin-bottom:4px;\">Canchas de pádel<\u002Fh4><p style=\"font-size:.85rem;color:#5c7a9a;line-height:1.5;\">Identificá cada cancha por nombre y asignale un cliente desde el plano.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#f7f9fc;border:1px solid #e4eaf2;border-radius:14px;padding:22px;display:flex;gap:14px;align-items:flex-start;transition:all .2s;\" style-hover=\"background:#fff;box-shadow:0 8px 24px rgba(18,75,115,.08);border-color:transparent;transform:translateY(-2px);\">\n        <div style=\"width:44px;height:44px;background:#fff;border:1px solid #e4eaf2;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;flex-shrink:0;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z\"><\u002Fpath><line x1=\"7\" y1=\"7\" x2=\"7.01\" y2=\"7\" stroke-width=\"2.5\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <div><h4 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:.97rem;font-weight:700;color:#0a2540;margin-bottom:4px;\">Indumentaria y librerías<\u002Fh4><p style=\"font-size:.85rem;color:#5c7a9a;line-height:1.5;\">Categorías, rubros y precios claros para el retail de todos los días.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#f7f9fc;border:1px solid #e4eaf2;border-radius:14px;padding:22px;display:flex;gap:14px;align-items:flex-start;transition:all .2s;\" style-hover=\"background:#fff;box-shadow:0 8px 24px rgba(18,75,115,.08);border-color:transparent;transform:translateY(-2px);\">\n        <div style=\"width:44px;height:44px;background:#fff;border:1px solid #e4eaf2;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#124b73;flex-shrink:0;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"1 4 1 10 7 10\"><\u002Fpolyline><path d=\"M3.51 15a9 9 0 102.13-9.36L1 10\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n ;gap:11px;align-items:flex-start;\"><div style=\"width:20px;height:20px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;\"><svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#16a34a\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><p style=\"font-size:.92rem;color:#334155;line-height:1.55;\"><strong style=\"color:#0a2540;\">Mesas abiertas en paralelo<\u002Fstrong> con su consumo guardado automáticamente.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;align-items:flex-start;\"><div style=\"width:20px;height:20px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;\"><svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#16a34a\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><p style=\"font-size:.92rem;color:#334155;line-height:1.55;\"><strong style=\"color:#0a2540;\">Contador de tiempo por mesa:<\u002Fstrong> cada widget muestra hace cuánto está ocupada o reservada para controlar tiempos de servicio.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e4eaf2;border-radius:18px;padding:26px;box-shadow:0 16px 48px rgba(18,75,115,.10);\">\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:.88rem;font-weight:700;color:#0a2540;text-align:center;margin-bottom:18px;\">Tu salón de un vistazo<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px;\">\n          <div style=\"background:#16a34a;border-radius:11px;padding:16px 8px;text-align:center;color:#fff;font-weight:700;font-size:.85rem;line-height:1.3;\">Mesa 1<span style=\"display:block;font-weight:500;opacity:.85;font-size:.7rem;margin-top:4px;\">Libre<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#dc2626;border-radius:11px;padding:16px 8px;text-align:center;color:#fff;font-weight:700;font-size:.85rem;line-height:1.3;\">Mesa 2<span style=\"display:block;font-weight:500;opacity:.85;font-size:.7rem;margin-top:4px;\">Ocupada<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#16a34a;border-radius:11px;padding:16px 8px;text-align:center;color:#fff;font-weight:700;font-size:.85rem;line-height:1.3;\">Mesa 3<span style=\"display:block;font-weight:500;opacity:.85;font-size:.7rem;margin-top:4px;\">Libre<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#ea7317;border-radius:11px;padding:16px 8px;text-align:center;color:#fff;font-weight:700;font-size:.85rem;line-height:1.3;\">Mesa 4<span style=\"display:block;font-weight:500;opacity:.85;font-size:.7rem;margin-top:4px;\">Reservada<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#dc2626;border-radius:11px;padding:16px 8px;text-align:center;color:#fff;font-weight:700;font-size:.85rem;line-height:1.3;\">Barra<span style=\"display:block;font-weight:500;opacity:.85;font-size:.7rem;margin-top:4px;\">Ocupada<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#16a34a;border-radius:11px;padding:16px 8px;text-align:center;color:#fff;font-weight:700;font-size:.85rem;line-height:1.3;\">Cancha 1<span style=\"display:block;font-weight:500;opacity:.85;font-size:.7rem;margin-top:4px;\">Libre<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:16px;justify-content:center;margin-top:16px;flex-wrap:wrap;\">\n          <span style=\"display:flex;align-items:center;gap:6px;font-size:.76rem;color:#5c7a9a;\"><span style=\"width:11px;height:11px;background:#16a34a;border-radius:3px;display:inline-block;\"><\u002Fspan>Libre<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:6px;font-size:.76rem;color:#5c7a9a;\"><span style=\"width:11px;height:11px;background:#dc2626;border-radius:3px;display:inline-block;\"><\u002Fspan>Ocupada<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:6px;font-size:.76rem;color:#5c7a9a;\"><span style=\"width:11px;height:11px;background:#ea7317;border-radius:3px;display:inline-block;\"><\u002Fspan>Reservada<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- AFIP -->\n<section id=\"afip\" style=\"background:#0a2540;padding:80px 0;\">\n  <div style=\"max-width:1200px;margin:0 auto;padding:0 32px;\">\n    <div style=\"text-align:center;margin-bottom:48px;\">\n      <div style=\"font-size:.75rem;font-weight:700;color:#4ade80;text-transform:uppercase;letter-spacing:1.3px;margin-bottom:10px;\">Cumplí sin complicarte<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.8rem,3vw,2.4rem);font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:12px;\">Facturación electrónica de verdad<\u002Fh2>\n      <p style=\"font-size:1.02rem;color:#7fa8c4;max-width:540px;margin:0 auto;line-height:1.65;\">avaFAC se conecta directamente con ARCA (ex AFIP) y gestiona el ticket de acceso, el punto de venta y la numeración por vos. Vos vendés, el sistema factura.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"ag\" style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:800px;margin:0 auto;\">\n      <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:26px;transition:all .2s;\" style-hover=\"background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.18);\">\n        <div style=\"width:46px;height:46px;background:rgba(255,255,255,.10);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#7dd3fc;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#fff;margin-bottom:6px;\">CAE automático<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#7fa8c4;line-height:1.6;\">Cada comprobante obtiene su CAE en línea, con renovación automática del ticket de acceso. Sin intervención manual.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:26px;transition:all .2s;\" style-hover=\"background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.18);\">\n        <div style=\"width:46px;height:46px;background:rgba(255,255,255,.10);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#7dd3fc;margin-bottom:16px;\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><line x1=\"17\" y1=\"11\" x2=\"23\" y2=\"11\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:1rem;font-weight:700;color:#fff;margin-bottom:6px;\">Condición de IVA del receptor<\u002Fh3>\n        <p style=\"font-size:.88rem;color:#7fa8c4;line-height:1.6;\">Informa la condición de IVA del cliente según la normativa vigente de ARCA (RG actualizada).<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:26px;transition:all .2s;\" style-hover=\"background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.18);\">\n        <div style=\"width:46px;height:46px;background:rgba(255,255,255,.10);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#7dd3fc;margin-bottom:16px;\"><svg widt
