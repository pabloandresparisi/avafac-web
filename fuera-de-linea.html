<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>No estamos recibiendo pedidos en este momento</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --ground: #FFF7F2;
    --ink: #26140F;
    --brand: #F5333F;
    --brand-2: #FF7A1A;
    --card: #ffffff;
    --muted: #8a7a72;
    --hair: #f2e7df;
    --shadow: 0 8px 22px rgba(120,40,25,.12);
    --serif: Georgia, "Times New Roman", serif;
    --sans: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
  }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: var(--sans); background: var(--ground); color: var(--ink);
    -webkit-font-smoothing: antialiased; min-height: 100%;
    display: flex; align-items: center; justify-content: center; padding: 24px; }

  .hero { position: relative; overflow: hidden; color: #fff; padding: 40px 26px 34px;
    border-radius: 22px; text-align: center;
    background: linear-gradient(135deg, #FF9A2E 0%, #FF4D3D 46%, #E01E63 100%);
    box-shadow: 0 18px 44px rgba(224,30,60,.28); max-width: 460px; width: 100%; }
  .hero::after { content: ""; position: absolute; inset: 0;
    background: radial-gradient(90% 120% at 100% 0%, rgba(255,255,255,.22), transparent 55%); }

  .icono { position: relative; font-size: 46px; margin-bottom: 6px; filter: drop-shadow(0 4px 10px rgba(0,0,0,.18)); }
  h1 { position: relative; font-family: var(--serif); font-weight: 700; margin: 4px 0 10px;
    font-size: 1.5em; text-wrap: balance; text-shadow: 0 1px 10px rgba(0,0,0,.15); }
  p.desc { position: relative; margin: 0 auto; font-size: .98em; line-height: 1.55; opacity: .97; max-width: 360px; }

  .card { position: relative; background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.28);
    border-radius: 14px; padding: 14px 18px; margin-top: 20px; text-align: left; }
  .card .tit { font-size: .74em; font-weight: 800; text-transform: uppercase; letter-spacing: .7px;
    opacity: .85; margin-bottom: 6px; }
  .card .horario { font-size: .98em; font-weight: 600; line-height: 1.6; }

  button#reintentar { position: relative; display: inline-flex; align-items: center; gap: 8px;
    margin-top: 22px; width: 100%; border: none; border-radius: 13px; padding: 13px 20px;
    background: #fff; color: var(--brand); font-size: 1em; font-weight: 800; font-family: inherit;
    box-shadow: 0 6px 16px rgba(0,0,0,.18); cursor: pointer; }
  button#reintentar:active { transform: translateY(1px); }

  .pie { position: relative; margin-top: 16px; font-size: .8em; opacity: .82; }
</style>
</head>
<body>
  <div class="hero">
    <div class="icono">🌙</div>
    <h1 id="titulo">No estamos recibiendo pedidos en este momento</h1>
    <p class="desc">Este local no está disponible para pedidos online ahora mismo. Volvé a intentar en unos minutos, o probá más tarde dentro de nuestro horario de atención.</p>

    <!-- Horario de atención: editable a mano por el comercio (placeholder genérico). -->
    <div class="card">
      <div class="tit">Horario de atención</div>
      <div class="horario">Lun a Sáb 12:00–15:30 y 20:00–00:00<br>Domingos 20:00–00:00</div>
    </div>

    <button id="reintentar" onclick="location.reload()">↻ Volver a intentar</button>
    <div class="pie">Powered by avaFAC</div>
  </div>

  <script>
    // Personaliza con el nombre de fantasía del comercio según el subdominio (ej.
    // "afiche.avafac.com.ar" -> clave "afiche" en comercios.json). Si el subdominio no
    // está en el mapa, o el fetch falla (ej. GitHub Pages caído), queda el texto genérico
    // de arriba sin romper nada. comercios.json vive en la raíz de este mismo repo
    // (GitHub Pages, avafac.com.ar) — la ruta es absoluta a propósito: esta página se
    // sirve desde el Worker de fallback para *.avafac.com.ar, así que un fetch relativo
    // volvería a pegarle al túnel caído del comercio en vez de a la landing.
    (function () {
      var subdominio = location.hostname.split('.')[0];
      fetch('https://avafac.com.ar/comercios.json', { cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (comercios) {
          var datos = comercios && comercios[subdominio];
          if (!datos || !datos.nombre) return;
          document.getElementById('titulo').textContent =
            datos.nombre + ' no está recibiendo pedidos en este momento';
        })
        .catch(function () { /* queda el texto genérico */ });
    })();
  </script>
</body>
</html>
